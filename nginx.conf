# ═══════════════════════════════════════════════════════════════════
# Nginx Konfiguration — Trading Agent Dashboard
# Datei: /etc/nginx/sites-available/trading-agent
# ═══════════════════════════════════════════════════════════════════

# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name YOUR_DOMAIN;  # ← Domain eintragen

    # Let's Encrypt Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;  # ← Domain eintragen

    # SSL (wird von certbot automatisch ausgefüllt)
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Passwortschutz (verhindert fremden Zugriff)
    auth_basic "Trading Agent";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Root: Mobile Dashboard HTML
    root /opt/trading-agent/public;
    index index.html;

    # Hauptseite: Mobile Dashboard
    location = / {
        try_files /index.html =404;
    }

    # API: Weiterleitung an Node.js
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Kein Caching für API
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        proxy_cache off;
    }

    # Health Check (kein Auth nötig für Monitoring)
    location = /api/health {
        auth_basic off;
        proxy_pass http://localhost:3000/api/health;
    }

    # Statische Assets
    location ~* \.(ico|png|jpg|svg|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # Logging
    access_log /var/log/nginx/trading-agent.access.log;
    error_log /var/log/nginx/trading-agent.error.log;
}
